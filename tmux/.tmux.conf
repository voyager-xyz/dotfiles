# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

set -g history-limit 9999999
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -g mouse on
unbind -T copy-mode-vi MouseDragEnd1Pane

set -s extended-keys on
set -g default-terminal "tmux-256color"

set -as terminal-features 'xterm*:extkeys:userkeys:RGB'
set -as terminal-features 'ghostty:extkeys:userkeys:RGB'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @logging-path "$HOME/tmux-logs"

# Daily tmux event log
set-hook -g session-created "run 'echo \"$(date +\"%Y-%m-%dT%H:%M:%S\") session-created #{session_name}\" >> $HOME/tmux-logs/events-$(date +\"%Y-%m-%d\").log'"
set-hook -g session-closed  "run 'echo \"$(date +\"%Y-%m-%dT%H:%M:%S\") session-closed  #{session_name}\" >> $HOME/tmux-logs/events-$(date +\"%Y-%m-%d\").log'"
set-hook -g window-linked   "run 'echo \"$(date +\"%Y-%m-%dT%H:%M:%S\") window-created #{session_name}/#{window_name}\" >> $HOME/tmux-logs/events-$(date +\"%Y-%m-%d\").log'"
set-hook -g window-unlinked "run 'echo \"$(date +\"%Y-%m-%dT%H:%M:%S\") window-closed  #{session_name}/#{window_name}\" >> $HOME/tmux-logs/events-$(date +\"%Y-%m-%d\").log'"
set-hook -g client-attached "run 'echo \"$(date +\"%Y-%m-%dT%H:%M:%S\") client-attached #{session_name}\" >> $HOME/tmux-logs/events-$(date +\"%Y-%m-%d\").log'"
set-hook -g client-detached "run 'echo \"$(date +\"%Y-%m-%dT%H:%M:%S\") client-detached #{session_name}\" >> $HOME/tmux-logs/events-$(date +\"%Y-%m-%d\").log'"
set -g @plugin "janoamaral/tokyo-night-tmux"
set -g @tokyo-night-tmux_theme night    # storm | day | default to 'night'
set -g @tokyo-night-tmux_transparent 1  # 1 or 0
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @fzf-url-history-limit '2000'
set -g @tokyo-night-tmux_show_netspeed 1
set -g @tokyo-night-tmux_netspeed_iface "wlan0" # Detected via default route
set -g @tokyo-night-tmux_netspeed_showip 1      # Display IPv4 address (default 0)
set -g @tokyo-night-tmux_netspeed_refresh 1     # Update interval in seconds (default 1)

# Project switcher popup with tt command
bind-key j display-popup -E "zsh -c 'source ~/.zshrc_func && tt'"


run '~/.tmux/plugins/tpm/tpm'
