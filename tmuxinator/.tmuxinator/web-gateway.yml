name: web-gateway
root: ~/Code/web-gateway

windows:
  - "1":
      layout: main-vertical
      panes:
        - ls && NVIM_APPNAME=nvim-astro nvim 
  - "2":
      panes:
        - ls && devbox shell
  - "3":
      panes:
        - ls && devbox shell
  - "4":
      panes:
        - ls && [[ "$DEVBOX_SERVICES_UP" == "true" ]] && devbox services up || true
