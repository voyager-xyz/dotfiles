name: users-service
root: ~/Code/users-service

windows:
  - "1":
      layout: main-vertical
      panes:
        - ls && NVIM_APPNAME=nvim-astro nvim && devbox shell
  - "2":
      panes:
        - ls && devbox shell
  - "3":
      panes:
        - ls && devbox shell
  - "4":
      panes:
        - ls && [[ "$DEVBOX_SERVICES_UP" == "true" ]] && devbox services up || true
