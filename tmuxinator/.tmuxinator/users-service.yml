name: users-service
root: ~/Code/users-service

windows:
  - editor:
      layout: main-vertical
      panes:
        - ls && nvim && devbox shell
  - console:
      panes:
        - ls && devbox shell
  - claude:
      panes:
        - ls && devbox shell
  - devbox_services:
      panes:
        - ls && [[ "$DEVBOX_SERVICES_UP" == "true" ]] && devbox services up || true
