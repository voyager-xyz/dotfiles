name: conversations-api
root: ~/Code/conversations-api

windows:
  - "1":
      panes:
        - ls &&   NVIM_APPNAME=nvim-astro nvim 
  - "2":
      panes:
        - ls && devbox shell
  - "3":
      panes:
        - ls && devbox shell
  - "4":
      panes:
        - ls && [[ "$DEVBOX_SERVICES_UP" == "true" ]] && devbox services up || true
