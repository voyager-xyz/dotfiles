name: murmur
root: ~/Code/murmur

windows:
  - editor:
      layout: main-vertical
      panes:
        - ji && nvim && devbox shell
  - console:
      panes:
        - ji && devbox shell
  - claude:
      panes:
        - ji && devbox shell
  - devbox_services:
      panes:
        - ji && [[ "$DEVBOX_SERVICES_UP" == "true" ]] && devbox services up || true
